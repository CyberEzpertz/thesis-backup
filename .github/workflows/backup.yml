name: Supabase Backup
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install matching PostgreSQL client
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates lsb-release postgresql-client
          SERVER_VERSION=$(psql "$DATABASE_URL" -tAc "SHOW server_version_num;" | cut -c1-2)
          echo "SERVER_VERSION=$SERVER_VERSION" >> $GITHUB_ENV
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-$SERVER_VERSION
      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          /usr/lib/postgresql/$SERVER_VERSION/bin/pg_dump "$DATABASE_URL" \
            --format=custom \
            --file=backups/supabase_$(date +%F_%H-%M).dump
      - name: Commit backup
        run: |
          git config user.name "supabase-backup-bot"
          git config user.email "backup@github.com"
          git add backups
          git commit -m "Automated Supabase backup" || echo "No changes"
          git push
